blueprint:
  name: Poolpumpe PV-optimiert Advanced
  description: >
    Intelligente Steuerung einer Poolpumpe mit:
      - Mindestlaufzeiten
      - separaten Zeiten für Werktage/Wochenende
      - PV-Überschussnutzung
      - optionaler Batteriespeicher-Berücksichtigung
      - optionaler Temperaturlogik
      - optionaler Poolsperre

  domain: automation

  input:

    pool_switch:
      name: Poolpumpe
      selector:
        entity:
          domain: switch

    weekday_start:
      name: Werktag Startzeit
      default: "11:00:00"
      selector:
        time:

    weekday_end:
      name: Werktag Endzeit
      default: "14:00:00"
      selector:
        time:

    weekend_start:
      name: Wochenende Startzeit
      default: "08:00:00"
      selector:
        time:

    weekend_end:
      name: Wochenende Endzeit
      default: "11:00:00"
      selector:
        time:

    enable_pv:
      name: PV Überschuss aktivieren
      default: true
      selector:
        boolean:

    pv_sensor:
      name: PV Überschuss Sensor
      selector:
        entity:
          domain: sensor

    pv_threshold:
      name: Mindestüberschuss
      default: 1500
      selector:
        number:
          min: 0
          max: 10000
          step: 100
          unit_of_measurement: W

trigger:
  - platform: time_pattern
    minutes: "/5"

condition: []

action:
  - choose:

      - conditions:
          - condition: time
            weekday:
              - mon
              - tue
              - wed
              - thu
              - fri
            after: !input weekday_start
            before: !input weekday_end

        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input pool_switch

      - conditions:
          - condition: time
            weekday:
              - sat
              - sun
            after: !input weekend_start
            before: !input weekend_end

        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input pool_switch

      - conditions:
          - condition: numeric_state
            entity_id: !input pv_sensor
            above: !input pv_threshold

        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input pool_switch

    default:
      - service: switch.turn_off
        target:
          entity_id: !input pool_switch

mode: single
