blueprint:
  name: Poolpumpe PV optimiert
  description: Poolpumpe mit Werktag/Wochenende + PV Überschuss
  domain: automation

  input:

    pool_switch:
      name: Poolpumpe
      selector:
        entity:
          domain: switch

    weekday_start:
      name: Werktag Start
      default: "11:00:00"
      selector:
        time:

    weekday_end:
      name: Werktag Ende
      default: "14:00:00"
      selector:
        time:

    weekend_start:
      name: Wochenende Start
      default: "08:00:00"
      selector:
        time:

    weekend_end:
      name: Wochenende Ende
      default: "11:00:00"
      selector:
        time:

    pv_sensor:
      name: PV Überschuss Sensor
      selector:
        entity:
          domain: sensor

    pv_threshold:
      name: PV Schwelle
      default: 1500
      selector:
        number:
          min: 0
          max: 10000
          step: 100

trigger:
  - platform: time_pattern
    minutes: "/5"

variables:

  weekday_start: !input weekday_start
  weekday_end: !input weekday_end
  weekend_start: !input weekend_start
  weekend_end: !input weekend_end
  pv_threshold: !input pv_threshold

condition: []

action:

  - choose:

      - conditions:
          - condition: template
            value_template: >
              {{
                now().weekday() < 5 and
                now().strftime('%H:%M:%S') >= weekday_start and
                now().strftime('%H:%M:%S') <= weekday_end
              }}

        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input pool_switch

      - conditions:
          - condition: template
            value_template: >
              {{
                now().weekday() >= 5 and
                now().strftime('%H:%M:%S') >= weekend_start and
                now().strftime('%H:%M:%S') <= weekend_end
              }}

        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input pool_switch

      - conditions:
          - condition: numeric_state
            entity_id: !input pv_sensor
            above: !input pv_threshold

        sequence:
          - service: switch.turn_on
            target:
              entity_id: !input pool_switch

    default:
      - service: switch.turn_off
        target:
          entity_id: !input pool_switch

mode: single
